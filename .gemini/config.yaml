# Gemini Code Assist Configuration for nba-dfs-optimizer
# Reference: https://developers.google.com/gemini-code-assist/docs/customize-repo-review

have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: true

ignore_patterns:
  - "*.egg-info/**"
  - "**/__pycache__/**"
  - "**/deprecated/**"
  - "**/design_docs/**"
  - "**/example_projs/**"
  - "**/.env"
  - "**/.env.example"
